- name: ForgeJo setup
  hosts: forgejo
  become: true

  vars:
    caddy_hostname: agent.csail.mit.edu

    data_device: /dev/vdb
    data_label: AGENT_DATA
    data_mount: /srv/data

    sglang_gateway_port: 30000
    sglang_gateway_worker_urls:
      - "https://kellis-h200-1.csail.mit.edu/agent"
    sglang_gateway_policy: cache_aware

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
        state: present
        update_cache: true

    - name: Ensure persistent mountpoint exists
      ansible.builtin.file:
        path: "{{ data_mount }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check whether labeled filesystem already exists
      ansible.builtin.command: blkid -L {{ data_label }}
      register: labeled_disk
      changed_when: false
      failed_when: false

    - name: Check whether candidate data device already has a filesystem
      ansible.builtin.command: blkid {{ data_device }}
      register: candidate_blkid
      changed_when: false
      failed_when: false
      when: labeled_disk.rc != 0

    - name: Refuse to format an already-formatted device with the wrong label
      ansible.builtin.fail:
        msg: "{{ data_device }} already has a filesystem but not label {{ data_label }}. Inspect manually with lsblk -f."
      when:
        - labeled_disk.rc != 0
        - candidate_blkid.rc == 0

    - name: Create ext4 filesystem with label
      community.general.filesystem:
        fstype: ext4
        dev: "{{ data_device }}"
        opts: "-L {{ data_label }}"
      when:
        - labeled_disk.rc != 0
        - candidate_blkid.rc != 0

    - name: Mount persistent volume by label
      ansible.posix.mount:
        path: "{{ data_mount }}"
        src: "LABEL={{ data_label }}"
        fstype: ext4
        opts: defaults,nofail
        state: mounted

    - name: Install Caddy apt key
      ansible.builtin.shell: |
        set -e
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
          | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

    - name: Install Caddy apt source
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt
        dest: /etc/apt/sources.list.d/caddy-stable.list
        mode: "0644"

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present
        update_cache: true

    - name: Configure Caddy
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        owner: root
        group: root
        mode: "0644"
      notify: Reload Caddy

    - name: Enable and start Caddy
      ansible.builtin.systemd:
        name: caddy
        enabled: true
        state: started

    - name: Install Docker and Compose plugin
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Create Forgejo persistent directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
      loop:
        - "{{ data_mount }}/forgejo"
        - "{{ data_mount }}/forgejo/data"
        - "{{ data_mount }}/forgejo/backups"

    - name: Create Forgejo compose directory
      ansible.builtin.file:
        path: /opt/forgejo
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Write Forgejo compose file
      ansible.builtin.template:
        src: templates/forgejo-compose.yaml.j2
        dest: /opt/forgejo/compose.yaml
        owner: root
        group: root
        mode: "0644"
      notify: Restart compose stack

    - name: Start Forgejo
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: /opt/forgejo
      changed_when: false

    - name: Create Forgejo backup directory
      ansible.builtin.file:
        path: /srv/data/forgejo/backups
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Install Forgejo backup script
      ansible.builtin.copy:
        dest: /usr/local/sbin/forgejo-backup
        owner: root
        group: root
        mode: "0750"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          BACKUP_DIR="/srv/data/forgejo/backups"
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          TMP="/tmp/forgejo-dump-${TS}.zip"
          OUT="${BACKUP_DIR}/forgejo-dump-${TS}.zip"

          mkdir -p "$BACKUP_DIR"

          docker exec --user git forgejo \
            forgejo dump \
              --file "$TMP" \
              --tempdir /tmp

          docker cp "forgejo:${TMP}" "$OUT"
          docker exec --user git forgejo rm -f "$TMP"

          find "$BACKUP_DIR" -type f -name 'forgejo-dump-*.zip' -mtime +14 -delete

          echo "Wrote $OUT"

    - name: Install Forgejo backup service
      ansible.builtin.copy:
        dest: /etc/systemd/system/forgejo-backup.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Backup Forgejo

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/forgejo-backup

    - name: Install Forgejo backup timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/forgejo-backup.timer
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Run Forgejo backup daily

          [Timer]
          OnCalendar=*-*-* 04:30:00
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Enable Forgejo backup timer
      ansible.builtin.systemd:
        name: forgejo-backup.timer
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload Caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
    - name: Restart compose stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: /opt/forgejo


- name: Forgejo runner setup
  hosts: runners
  become: true

  vars:
    forgejo_url: https://agent.csail.mit.edu
    forgejo_host: agent.csail.mit.edu
    runner_image: data.forgejo.org/forgejo/runner:12
    runner_config_dir: /opt/forgejo-runner
    runner_data_dir: /var/lib/forgejo-runner
    runner_scope: ""
    runner_capacity: 1
    runner_labels:
      - "docker:docker://docker.io/library/buildpack-deps:trixie-scm"
      - "python:docker://docker.io/library/python:3.13-trixie"
      - "go:docker://docker.io/library/golang:1.26-trixie"
      - "node:docker://docker.io/library/node:22-trixie"

  tasks:
    - name: Install Podman and Compose plugin
      ansible.builtin.apt:
        name:
          - podman
          - docker-compose-v2
        state: present
        update_cache: true

    - name: Enable and start Podman socket
      ansible.builtin.systemd:
        name: podman.socket
        enabled: true
        state: started
        daemon_reload: true

    - name: Create runner compose directory
      ansible.builtin.file:
        path: "{{ runner_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create runner data directory
      ansible.builtin.file:
        path: "{{ runner_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create runner cache directory
      ansible.builtin.file:
        path: "{{ runner_data_dir }}/.cache"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check if runner is already registered
      ansible.builtin.stat:
        path: "{{ runner_data_dir }}/runner-config.yml"
      register: runner_config_file

    - name: Generate registration secret
      ansible.builtin.command: openssl rand -hex 20
      register: runner_secret
      changed_when: false
      when: not runner_config_file.stat.exists

    - name: Register runner on Forgejo (offline registration)
      ansible.builtin.command:
        cmd: >-
          docker exec --user git forgejo forgejo forgejo-cli actions register
          --name {{ inventory_hostname_short }}
          {{ '--scope ' ~ runner_scope if runner_scope else '' }}
          --secret {{ runner_secret.stdout }}
      delegate_to: "{{ forgejo_host }}"
      register: runner_registration
      when: not runner_config_file.stat.exists

    - name: Set runner registration facts
      ansible.builtin.set_fact:
        runner_uuid: "{{ runner_registration.stdout_lines | last | trim }}"
        runner_token: "{{ runner_secret.stdout }}"
      when: not runner_config_file.stat.exists

    - name: Show runner registration
      ansible.builtin.debug:
        msg: "Runner '{{ inventory_hostname_short }}' registered — UUID {{ runner_uuid }}"
      when: not runner_config_file.stat.exists

    - name: Write runner config
      ansible.builtin.template:
        src: templates/runner-config.yaml.j2
        dest: "{{ runner_data_dir }}/runner-config.yml"
        owner: root
        group: root
        mode: "0640"
      when: not runner_config_file.stat.exists

    - name: Write runner compose file
      ansible.builtin.template:
        src: templates/runner-compose.yaml.j2
        dest: "{{ runner_config_dir }}/compose.yaml"
        owner: root
        group: root
        mode: "0640"

    - name: Start runner
      ansible.builtin.command:
        cmd: podman compose up -d
        chdir: "{{ runner_config_dir }}"
      changed_when: false
